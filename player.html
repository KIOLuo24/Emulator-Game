<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Emulator-Game</title>
    <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background: #000000}
    #game-container {width:100vw;height:100vh;}
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game');
        const type = urlParams.get('type');

        window.EJS_DEBUG_XX = false;

        window.EJS_player = '#game';

        const coreMap = {
            'ps1': 'pcsx_rearmed',
            'playstation': 'pcsx_rearmed',
            'nes': 'fceumm',
            'snes': 'snes9x',
            'gb': 'gambatte',
            'gbc': 'gambatte',
            'gba': 'mgba',
            'nds': 'melonds',
            'n64': 'mupen64plus_next',
            'genesis': 'genesis_plus_gx',
            'sega': 'genesis_plus_gx',
            'segacd': 'genesis_plus_gx',
            'saturn': 'yabause',
            'neogeopocket': 'mednafen_ngp',
            'neogeopocketcolor': 'mednafen_ngp',
            'neogeo': 'fbneo',
            'arcade': 'fbneo'
        };

        const folderMap = {
            'mame': 'fbneo',
            'ps1': 'playstation',
            'playstation': 'playstation'
        };

        const coreType = type ? type.toLowerCase() : '';
        const mappedCore = coreMap[coreType] || coreType;
        window.EJS_core = mappedCore;
        
        console.log('=== EmulatorJS Debug Info ===');
        console.log('URL type parameter:', type);
        console.log('coreType (lowercase):', coreType);
        console.log('mappedCore (from coreMap):', mappedCore);
        console.log('window.EJS_core:', window.EJS_core);
        console.log('Expected core file: gambatte-legacy-wasm.data');
        console.log('=============================');

        if (game && type) {
            const folderName = folderMap[coreType] || coreType;
            window.EJS_gameUrl = `./roms/${folderName}/${game}`;
            console.log('Game URL:', window.EJS_gameUrl);
        }

        window.EJS_pathtodata = './ems/data/';
        console.log('Path to data:', window.EJS_pathtodata);

        window.EJS_language = 'en-US';

        if (coreType === 'ps1' || coreType === 'playstation') {
            window.EJS_biosUrl = "./bios/scph5501.bin";

            fetch('./bios/scph5501.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('scph5501.bin not found, switching to scph5502.bin');
                        window.EJS_biosUrl = "./bios/scph5502.bin";
                    } else {
                        console.log('Using scph5501.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check scph5501.bin, switching to scph5502.bin');
                    window.EJS_biosUrl = "./bios/scph5502.bin";
                });
        }
        else if (coreType === 'gba') {
            window.EJS_biosUrl = "./bios/gba_bios.bin";
        }
        else if (coreType === 'gb' || coreType === 'gbc') {
            window.EJS_biosUrl = "./bios/gbc_bios.bin";
        }
        else if (coreType === 'segacd') {
            window.EJS_biosUrl = "./bios/bios_CD_U.bin";
        }
        else if (coreType === 'saturn') {
            window.EJS_biosUrl = "./bios/saturn_bios.bin";
        }
        else if (coreType === 'neogeopocket' || coreType === 'neogeopocketcolor') {
            window.EJS_biosUrl = "./bios/Neo-Geo_Pocket_Color.bin";

            fetch('./bios/Neo-Geo_Pocket_Color.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('Neo-Geo_Pocket_Color.bin not found, switching to Neo-Geo_Pocket.bin');
                        window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                    } else {
                        console.log('Using Neo-Geo_Pocket_Color.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check Neo-Geo_Pocket_Color.bin, switching to Neo-Geo_Pocket.bin');
                    window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                });
        }
        
        if (coreType === 'mame' || coreType === 'fbneo' || coreType === 'arcade' || coreType === 'neogeo') {
            window.EJS_settings = {
                "webgl2Enabled": "enabled"
            };

            if (game && game.includes('mslug6')) {
                window.EJS_biosUrl = "./bios/awbios.zip";
            }

            console.log("FBNeo mode: Scanning ROM directory for BIOS...");
        }
    </script>
    <script src="./ems/data/loader.js"></script>
</body>
</html>
