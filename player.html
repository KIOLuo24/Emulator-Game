<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Emulator-Game</title>
    <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background: #000000}
    #game-container {width:100vw;height:100vh;}
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
    </div>
    <script>
    // 拦截所有 fetch 请求,移除 userid 参数
    const originalFetch = window.fetch;
    window.fetch = function(...args) {
        let url = args[0];
        if (typeof url === 'string' && url.includes('?userid=')) {
            url = url.replace(/\?userid=[^&]*&?/, '?').replace(/\?$/, '');
            args[0] = url;
        } else if (url instanceof Request && url.url.includes('?userid=')) {
            const newUrl = url.url.replace(/\?userid=[^&]*&?/, '?').replace(/\?$/, '');
            args[0] = new Request(newUrl, url);
        }
        return originalFetch.apply(this, args);
    };

    // 拦截 XMLHttpRequest
    const originalXHROpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        if (typeof url === 'string' && url.includes('?userid=')) {
            url = url.replace(/\?userid=[^&]*&?/, '?').replace(/\?$/, '');
        }
        return originalXHROpen.call(this, method, url, ...rest);
    };

    //获取 URL 参数,例如player.html?game=mario&type=nes
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game');
        const type = urlParams.get('type');

        // 启用调试模式,加载非压缩文件
        window.EJS_DEBUG_XX = true;

        window.EJS_player = '#game';

        // 核心名称映射(将简写映射到实际的核心名称)
        const coreMap = {
            'ps1': 'pcsx_rearmed',
            'playstation': 'pcsx_rearmed',
            'nes': 'fceumm',
            'snes': 'snes9x',
            'gb': 'gambatte',
            'gbc': 'gambatte',
            'gba': 'mgba',
            'nds': 'melonds',
            'n64': 'mupen64plus_next',
            'genesis': 'genesis_plus_gx',
            'sega': 'genesis_plus_gx',
            'segacd': 'genesis_plus_gx',
            'saturn': 'yabause',
            'neogeopocket': 'mednafen_ngp',
            'neogeopocketcolor': 'mednafen_ngp',
            'neogeo': 'fbneo',
            'arcade': 'fbneo'
        };

        // ROM 文件夹路径映射(将简写映射到实际的文件夹名称)
        const folderMap = {
            'mame': 'fbneo',
            'ps1': 'playstation',
            'playstation': 'playstation'
        };

        // 根据类型获取正确的核心名称
        const coreType = type ? type.toLowerCase() : '';
        window.EJS_core = coreMap[coreType] || coreType;

        //---本地路径配置---
        //指向你本地存放游戏的目录(使用文件夹映射)
        if (game && type) {
            const folderName = folderMap[coreType] || type;

            if (coreType === 'ps1' || coreType === 'playstation') {
                const gamePath = `./roms/${folderName}/${game}/`;

                // 1. 设置主入口文件(会被挂载到虚拟根目录 / )
                window.EJS_gameUrl = `${gamePath}${game}.cue`;

                // 依然需要映射 .bin,否则只有 .cue 是没法运行的
                window.EJS_extraFiles = {};
                window.EJS_extraFiles[`${game}.bin`] = `${gamePath}${game}.bin`;

                console.log("PS1 Files mapped for virtual root:", window.EJS_extraFiles);
            } else {
                window.EJS_gameUrl = `./roms/${folderName}/${game}`;
            }
        }

        // 指向你本地解压的 EmulatorJS 数据目录
        window.EJS_pathtodata = './ems/data/';

        // 设置语言为英文(避免 zh-CN.json 缺失问题)
        window.EJS_language = 'en';

        // BIOS 配置
        if (coreType === 'ps1' || coreType === 'playstation') {
            // PS1: 优先使用 scph5501.bin,如果不存在则使用 scph5502.bin
            window.EJS_biosUrl = "./bios/scph5501.bin";

            fetch('./bios/scph5501.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('scph5501.bin not found, switching to scph5502.bin');
                        window.EJS_biosUrl = "./bios/scph5502.bin";
                    } else {
                        console.log('Using scph5501.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check scph5501.bin, switching to scph5502.bin');
                    window.EJS_biosUrl = "./bios/scph5502.bin";
                });
        }
        else if (coreType === 'gba') {
            window.EJS_biosUrl = "./bios/gba_bios.bin";
        }
        else if (coreType === 'segacd') {
            window.EJS_biosUrl = "./bios/bios_CD_U.bin";
        }
        else if (coreType === 'saturn') {
            window.EJS_biosUrl = "./bios/saturn_bios.bin";
        }
        else if (coreType === 'neogeopocket') {
            // NeoGeo Pocket: 优先使用彩色版,回退到普通版
            window.EJS_biosUrl = "./bios/Neo-Geo_Pocket_Color.bin";

            fetch('./bios/Neo-Geo_Pocket_Color.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('Neo-Geo_Pocket_Color.bin not found, switching to Neo-Geo_Pocket.bin');
                        window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                    } else {
                        console.log('Using Neo-Geo_Pocket_Color.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check Neo-Geo_Pocket_Color.bin, switching to Neo-Geo_Pocket.bin');
                    window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                });
        }
        else if (coreType === 'neogeopocketcolor') {
            window.EJS_biosUrl = "./bios/Neo-Geo_Pocket_Color.bin";

            fetch('./bios/Neo-Geo_Pocket_Color.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('Neo-Geo_Pocket_Color.bin not found, switching to Neo-Geo_Pocket.bin');
                        window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                    } else {
                        console.log('Using Neo-Geo_Pocket_Color.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check Neo-Geo_Pocket_Color.bin, switching to Neo-Geo_Pocket.bin');
                    window.EJS_biosUrl = "./bios/Neo-Geo_Pocket.bin";
                });
        }
        if (coreType === 'mame' || coreType === 'fbneo' || coreType === 'arcade' || coreType === 'neogeo') {
            // 关键:不再通过 EJS_biosUrl 挂载,因为你已经把 neogeo.zip 放到了 ROM 同级目录
            // 这能避免 loader.js 将其挂载到错误的虚拟路径下

            window.EJS_settings = {
                "webgl2Enabled": "enabled"
            };
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

            if (game && game.includes('mslug6')) {
                window.EJS_biosUrl = "./bios/awbios.zip";
            }

            console.log("FBNeo mode: Scanning ROM directory for BIOS...");
        }
    </script>
    <script src="https://github.com/KIOLuo24/EmulatorJS.git/data/loader.js"></script>
</body>
</html>
