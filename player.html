<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Emulator-Game</title>
    <style>
    body,html{margin:0;padding:0;width:80%;height:80%;background: #000000}
    #game-container {width:100vw;height:100vh;}
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
    </div>
    <script>
    //获取 URL 参数，例如player.html?game=mario&type=nes
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game');
        const type = urlParams.get('type');

        // 启用调试模式，加载非压缩文件
        window.EJS_DEBUG_XX = true;

        window.EJS_player = '#game';

        // 核心名称映射（将简写映射到实际的核心名称）
        const coreMap = {
            'ps1': 'pcsx_rearmed',
            'playstation': 'pcsx_rearmed',
            'nes': 'fceumm',
            'snes': 'snes9x',
            'gb': 'gambatte',
            'gbc': 'gambatte',
            'gba': 'mgba',
            'nds': 'melonds',
            'n64': 'mupen64plus_next',
            'genesis': 'genesis_plus_gx',
            'sega': 'genesis_plus_gx',
            'segacd': 'genesis_plus_gx',
            'saturn': 'yabause',
            'neogeopocket': 'mednafen_ngp',
            'neogeopocketcolor': 'mednafen_ngp',
            'neogeo': 'fbneo',
            'arcade': 'fbneo'
        };

        // ROM 文件夹路径映射（将简写映射到实际的文件夹名称）
        const folderMap = {
            'ps1': 'playstation',
            'playstation': 'playstation',
        };

        // 根据类型获取正确的核心名称
        const coreType = type ? type.toLowerCase() : '';
        window.EJS_core = coreMap[coreType] || coreType;

        //---本地路径配置---
        //指向你本地存放游戏的目录（使用文件夹映射）
        if (game && type) {
            const folderName = folderMap[coreType] || type;
            window.EJS_gameUrl = `/Emulator-Game/roms/${folderName}/${game}`;
        }

        // 指向你本地解压的 EmulatorJS 数据目录
        window.EJS_pathtodata = 'https://kioluo24.github.io/EmulatorJS/data/';

        // 设置语言为英文（避免 zh-CN.json 缺失问题）
        window.EJS_language = 'en';

        // BIOS 配置
        if (coreType === 'ps1' || coreType === 'playstation') {
            // PS1: 优先使用 scph5501.bin，如果不存在则使用 scph5502.bin
            window.EJS_biosUrl = "/Emulator-Game/bios/scph5501.bin";

            fetch('/Emulator-Game/bios/scph5501.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('scph5501.bin not found, switching to scph5502.bin');
                        window.EJS_biosUrl = "/Emulator-Game/bios/scph5502.bin";
                    } else {
                        console.log('Using scph5501.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check scph5501.bin, switching to scph5502.bin');
                    window.EJS_biosUrl = "/Emulator-Game/bios/scph5502.bin";
                });
        }
        else if (coreType === 'gba') {
            window.EJS_biosUrl = "/Emulator-Game/bios/gba_bios.bin";
        }
             else if (coreType === 'gbc') {
            window.EJS_biosUrl = "/Emulator-Game/bios/gbc_bios.bin";
        }
        else if (coreType === 'segacd') {
            window.EJS_biosUrl = "/Emulator-Game/bios/bios_CD_U.bin";
        }
        else if (coreType === 'saturn') {
            window.EJS_biosUrl = "/Emulator-Game/bios/saturn_bios.bin";
        }
        else if (coreType === 'neogeopocket') {
            // NeoGeo Pocket: 优先使用彩色版，回退到普通版
            window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket_Color.bin";

            fetch('/Emulator-Game/bios/Neo-Geo_Pocket_Color.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('Neo-Geo_Pocket_Color.bin not found, switching to Neo-Geo_Pocket.bin');
                        window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket.bin";
                    } else {
                        console.log('Using Neo-Geo_Pocket_Color.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check Neo-Geo_Pocket_Color.bin, switching to Neo-Geo_Pocket.bin');
                    window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket.bin";
                });
        }
        else if (coreType === 'neogeopocketcolor') {
            window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket_Color.bin";

            fetch('/Emulator-Game/bios/Neo-Geo_Pocket_Color.bin', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('Neo-Geo_Pocket_Color.bin not found, switching to Neo-Geo_Pocket.bin');
                        window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket.bin";
                    } else {
                        console.log('Using Neo-Geo_Pocket_Color.bin BIOS');
                    }
                })
                .catch(() => {
                    console.log('Failed to check Neo-Geo_Pocket_Color.bin, switching to Neo-Geo_Pocket.bin');
                    window.EJS_biosUrl = "/Emulator-Game/bios/Neo-Geo_Pocket.bin";
                });
        }
    </script>
    <script src="https://kioluo24.github.io/EmulatorJS/data/loader.js"></script>
</body>
</html>
